name: CI

on:
  push:
    branches: [master, main, 'ci/**', 'test/**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: debian-amd64
            runner: ubuntu-24.04
            container: debian:bookworm
          - target: debian-arm64
            runner: ubuntu-24.04-arm
            container: debian:bookworm

    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates git build-essential cmake pkg-config libssl-dev

      - name: Checkout
        uses: actions/checkout@v4

      # The container runs as root and git refuses to operate on a tree
      # owned by another uid by default.
      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ./build/easy_se_cli --help
