# /etc/easy-se/example.conf — example easy_se profile.
#
# To use:
#   sudo cp  /etc/easy-se/example.conf  /etc/easy-se/<profile>.conf
#   sudo chmod 0600 /etc/easy-se/<profile>.conf      # if SE_PASS is set
#   sudoedit /etc/easy-se/<profile>.conf             # edit host/user/etc.
#   sudo install -m 0600 /dev/null /etc/easy-se/<profile>.pass
#   sudoedit /etc/easy-se/<profile>.pass             # one line: password
#   sudo systemctl enable --now easy-se@<profile>.service
#
# Format: systemd EnvironmentFile-style KEY=VALUE, one per line.
# Also accepted by easy_se_cli --config <path> outside systemd.
#
# This file is shipped read-only as part of the easy-se package; the
# unit file looks for /etc/easy-se/<instance>.conf only, not example.conf,
# so leaving the example here doesn't try to start a phantom service.

# Note: this file is parsed like a systemd EnvironmentFile.  Inline
# comments are NOT supported — everything after `=` is the value,
# including trailing whitespace and any `#`.  Put comments on their
# own lines.

# --- Required ---
SE_HOST=vpn.example.com
SE_USER=alice

# --- Auth ---
# SE_PASS=plaintext-password
# SE_AUTH selects the auth mode.  "password" (default) = local
# hashed SHA-0; "radius" / "plain" = plaintext, required for RADIUS
# users and for local users that the server admin set up with
# plaintext auth.
# SE_AUTH=password

# --- TLS validation (default ON — only disable for self-signed servers) ---
SE_VERIFY_CERT=1
# SE_CA_PATH=/etc/ssl/certs

# --- Server ---
SE_PORT=443
SE_HUB=DEFAULT

# --- Routing ---
# install default route via VPN (otherwise only the assigned subnet)
SE_DEFAULT_GW=1
# SE_TUN_NAME=sevpn0

# --- Optional features ---
# verbose logs to journalctl
# SE_DEBUG=1
# keepalive interval in seconds; default is the library setting (60 s)
# SE_KEEPALIVE=60
# start HTTP CONNECT + SOCKS5 proxy on 127.0.0.1
# SE_PROXY=1
# SE_PROXY_PORT=1080
